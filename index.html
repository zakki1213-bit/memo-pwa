<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="メモ">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>メモ</title>
<style>
:root {
  --bg:#fafaf8; --surface:#fff; --border:#e5e5e2;
  --text:#1a1a1a; --muted:#999; --accent:#2563eb;
}
@media (prefers-color-scheme:dark) {
  :root { --bg:#1c1c1c; --surface:#242424; --border:#333; --text:#f0f0f0; --muted:#666; }
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; overflow-x:hidden; width:100%; }
body {
  height:100dvh; width:100%; max-width:100%; overflow-x:hidden;
  font-family:-apple-system,"Hiragino Sans",sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column;
}

/* ヘッダー */
header {
  display:flex; align-items:center;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 12px; flex-shrink:0;
  position:sticky; top:0; z-index:10; gap:0;
}
.tab {
  padding:14px 16px; font-size:15px; font-weight:600;
  border:none; background:none; color:var(--muted);
  cursor:pointer; border-bottom:2px solid transparent;
  font-family:inherit; min-height:48px;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
#save-indicator { font-size:12px; color:var(--muted); margin-left:auto; }
#btn-settings {
  background:none; border:none; font-size:18px; cursor:pointer;
  color:var(--muted); padding:0 4px; line-height:1; flex-shrink:0;
}

/* メインコンテンツ */
main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

#tab-memo { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#memo-area {
  flex:1; width:100%; max-width:100%; resize:none;
  border:none; outline:none;
  padding:20px 20px calc(18px * 1.9 * 3) 20px;
  font-size:18px; line-height:1.9;
  font-family:-apple-system,"Hiragino Sans",sans-serif;
  background:var(--bg); color:var(--text);
  overflow-y:auto; overflow-x:hidden;
  -webkit-appearance:none; overscroll-behavior:contain; touch-action:pan-y;
}

#tab-search { flex:1; flex-direction:column; overflow:hidden; display:none; }
#search-wrap { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface); }
#search-input {
  width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px;
  font-size:16px; font-family:inherit; background:var(--bg); color:var(--text); outline:none;
}
#search-input:focus { border-color:var(--accent); }
#search-results { flex:1; overflow-y:auto; padding:12px 16px; }
#search-hint { color:var(--muted); font-size:14px; padding:24px 0; text-align:center; line-height:1.8; }
.result-block {
  padding:12px 14px; border:1px solid var(--border); border-radius:8px;
  margin-bottom:10px; background:var(--surface);
  font-size:15px; line-height:1.7; white-space:pre-wrap; word-break:break-all;
  cursor:pointer;
}
.result-block:hover { border-color:var(--accent); }
.result-block mark { background:#fef08a; color:#1a1a1a; border-radius:2px; padding:0 1px; }
.result-meta { font-size:11px; color:var(--muted); margin-bottom:6px; }
#search-empty { color:var(--muted); font-size:14px; padding:20px 0; text-align:center; }

/* 設定モーダル */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:100; padding:16px; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border-radius:12px; padding:18px; width:100%; max-width:380px; }
.modal h2 { font-size:15px; font-weight:700; margin-bottom:14px; }
.setting-row { margin-bottom:12px; }
.setting-row label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.setting-row input { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:monospace; background:var(--bg); color:var(--text); outline:none; }
.setting-row input:focus { border-color:var(--accent); }
.setting-note { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5; }
.setting-status { padding:8px 12px; border-radius:6px; font-size:13px; display:none; margin-bottom:10px; }
.setting-status.ok  { background:#e8f5e9; color:#2e7d32; display:block; }
.setting-status.err { background:#ffebee; color:#c62828; display:block; }
.modal-btns { display:flex; gap:8px; }
.btn { padding:9px 16px; border-radius:7px; border:none; font-size:13px; font-weight:600; cursor:pointer; flex:1; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-sub { background:var(--border); color:var(--text); }
</style>
</head>
<body>

<header>
  <button class="tab active" onclick="showTab('memo')">メモ</button>
  <button class="tab" onclick="showTab('search')">検索</button>
  <span id="save-indicator"></span>
  <button id="btn-settings" onclick="openSettings()" title="Gist同期設定">⚙️</button>
</header>

<main>
  <div id="tab-memo">
    <textarea id="memo-area" placeholder="ここに書く..."></textarea>
  </div>
  <div id="tab-search">
    <div id="search-wrap">
      <input id="search-input" type="search" placeholder="検索..." oninput="doSearch(this.value)">
    </div>
    <div id="search-results">
      <div id="search-hint">キーワードを入力すると<br>タイムスタンプ区切りごとに<br>検索結果が表示されます</div>
    </div>
  </div>
</main>

<!-- 起動オーバーレイ（iOS用：1タップでキーボード表示） -->
<div id="start-overlay" onclick="startTyping()" style="
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:transparent;
">
  <div style="
    background:rgba(0,0,0,.55); color:#fff;
    padding:14px 28px; border-radius:24px;
    font-size:16px; font-weight:600; letter-spacing:.04em;
    pointer-events:none;
  ">タップして入力</div>
</div>

<!-- 設定モーダル -->
<div class="modal-bg" id="settings-modal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>⚙️ GitHub Gist 同期設定</h2>
    <div class="setting-row">
      <label>GitHub トークン（gistスコープ必須）</label>
      <input type="password" id="gist-token-input" placeholder="ghp_xxxx または github_pat_xxxx">
      <div class="setting-note">ターミナルで <code>gh auth token</code> を実行するとトークンが表示されます。</div>
    </div>
    <div class="setting-row">
      <label>Gist ID（初回接続後に自動入力）</label>
      <input type="text" id="gist-id-input" placeholder="自動生成されます">
    </div>
    <div id="setting-status" class="setting-status"></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="testAndSaveGist()">接続テスト &amp; 保存</button>
      <button class="btn btn-sub" onclick="closeSettings()">閉じる</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:10px;">※ トークンはこのデバイスのブラウザにのみ保存されます</div>
  </div>
</div>

<script>
const STORAGE_KEY    = "memo_text_v1";
const GIST_TOKEN_KEY = "memo_gist_token";
const GIST_ID_KEY    = "memo_gist_id";
const GIST_FILE      = "memo_data.json";
const IDLE_MS  = 5 * 60 * 1000;
const LOCAL_MS = 1500;   // localStorageへの保存間隔
const GIST_MS  = 5000;   // Gistへのpush間隔

let lastStampTime = 0;
let needsStamp    = false;
let localTimer    = null;
let gistTimer     = null;
let isSaving      = false;
let gistToken = localStorage.getItem(GIST_TOKEN_KEY) || "";
let gistId    = localStorage.getItem(GIST_ID_KEY)    || "";

const area = document.getElementById("memo-area");

// =============================================
//  Gist 同期
// =============================================
function setIndicator(msg) { document.getElementById("save-indicator").textContent = msg; }

async function loadFromGist() {
  if (!gistToken || !gistId) return false;
  try {
    setIndicator("読込中…");
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${gistToken}`, Accept: "application/vnd.github.v3+json" }
    });
    if (!res.ok) { setIndicator("⚠同期失敗"); return false; }
    const gist = await res.json();
    const raw = gist.files[GIST_FILE]?.content;
    if (!raw) { setIndicator(""); return false; }
    const data = JSON.parse(raw);
    if (typeof data.text === "string") {
      area.value = data.text;
      localStorage.setItem(STORAGE_KEY, data.text);
    }
    setIndicator("☁ 同期済み");
    setTimeout(() => setIndicator(""), 2000);
    return true;
  } catch(e) { console.error(e); setIndicator("⚠同期失敗"); return false; }
}

async function createGist(text) {
  const res = await fetch("https://api.github.com/gists", {
    method: "POST",
    headers: { Authorization: `token ${gistToken}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ description: "メモ Data", public: false, files: { [GIST_FILE]: { content: JSON.stringify({text}) } } })
  });
  if (!res.ok) throw new Error("Gist作成失敗");
  const gist = await res.json();
  gistId = gist.id;
  localStorage.setItem(GIST_ID_KEY, gistId);
}

async function pushToGist(text) {
  if (!gistToken || isSaving) return;
  isSaving = true;
  try {
    if (!gistId) { await createGist(text); return; }
    await fetch(`https://api.github.com/gists/${gistId}`, {
      method: "PATCH",
      headers: { Authorization: `token ${gistToken}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({text}) } } })
    });
    setIndicator("☁ 保存済み ✓");
    setTimeout(() => setIndicator(""), 2000);
  } catch(e) { console.error(e); setIndicator("⚠ 同期失敗"); }
  finally { isSaving = false; }
}

// =============================================
//  設定UI
// =============================================
function openSettings() {
  document.getElementById("gist-token-input").value = gistToken;
  document.getElementById("gist-id-input").value    = gistId;
  document.getElementById("setting-status").className = "setting-status";
  document.getElementById("setting-status").textContent = "";
  document.getElementById("settings-modal").classList.add("open");
}
function closeSettings() { document.getElementById("settings-modal").classList.remove("open"); }

async function testAndSaveGist() {
  const token = document.getElementById("gist-token-input").value.trim();
  const id    = document.getElementById("gist-id-input").value.trim();
  const el    = document.getElementById("setting-status");
  el.className = "setting-status"; el.textContent = "接続確認中…";
  try {
    const res = await fetch("https://api.github.com/user", {
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" }
    });
    if (!res.ok) throw new Error("トークンが無効です");
    const user = await res.json();
    gistToken = token; gistId = id;
    localStorage.setItem(GIST_TOKEN_KEY, gistToken);
    localStorage.setItem(GIST_ID_KEY, gistId);
    el.className = "setting-status ok";
    el.textContent = `✓ 接続成功 (${user.login})`;
    if (gistId) { await loadFromGist(); openMemoTab(); }
    else { await pushToGist(area.value); }
    setTimeout(closeSettings, 1000);
  } catch(e) { el.className = "setting-status err"; el.textContent = "✗ " + e.message; }
}

// =============================================
//  Service Worker
// =============================================
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(console.error);

// =============================================
//  起動
// =============================================
function startTyping() {
  document.getElementById("start-overlay").style.display = "none";
  area.focus();
  const end = area.value.length;
  area.setSelectionRange(end, end);
  area.scrollTop = area.scrollHeight;
  needsStamp = (Date.now() - lastStampTime > IDLE_MS);
}

window.addEventListener("load", async () => {
  area.value = localStorage.getItem(STORAGE_KEY) || "";

  // Android など autofocus が効く環境では直接フォーカス
  area.focus();
  const focused = document.activeElement === area;
  if (focused) {
    document.getElementById("start-overlay").style.display = "none";
    openMemoTab();
  }
  // iOS PWA など効かない場合はオーバーレイを残す（タップで開始）

  if (gistToken && gistId) {
    const ok = await loadFromGist();
    if (ok) openMemoTab();
  }
});

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") showTab("memo");
});

// =============================================
//  メモタブ初期化
// =============================================
function openMemoTab() {
  area.scrollTop = area.scrollHeight;
  const end = area.value.length;
  area.setSelectionRange(end, end);
  area.focus();
  needsStamp = (Date.now() - lastStampTime > IDLE_MS);
}

// =============================================
//  タイムスタンプ
// =============================================
function formatTimestamp(d) {
  const days = ["日","月","火","水","木","金","土"];
  const m  = d.getMonth() + 1;
  const dd = d.getDate();
  const dw = days[d.getDay()];
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  return `── ${m}/${dd}（${dw}）${hh}:${mm} ──`;
}

function insertTimestampAtBottom() {
  const cur = area.value;
  const ts  = formatTimestamp(new Date());
  let prefix = "";
  if (cur && !cur.endsWith("\n\n")) prefix = cur.endsWith("\n") ? "\n" : "\n\n";
  area.value = cur + prefix + ts + "\n";
  area.scrollTop = area.scrollHeight;
  const end = area.value.length;
  area.setSelectionRange(end, end);
  lastStampTime = Date.now();
  needsStamp = false;
}

// =============================================
//  テキストエリア イベント
// =============================================
area.addEventListener("touchend", () => {
  setTimeout(() => { if (area.selectionStart !== area.value.length) needsStamp = false; }, 150);
}, { passive: true });

area.addEventListener("mousedown", () => {
  setTimeout(() => { if (area.selectionStart !== area.value.length) needsStamp = false; }, 0);
});

area.addEventListener("keydown", e => {
  if (!needsStamp || e.isComposing) return;
  if (["Shift","Control","Alt","Meta","CapsLock","Tab","Escape",
       "ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) return;
  insertTimestampAtBottom();
});

area.addEventListener("compositionstart", () => {
  if (!needsStamp) return;
  insertTimestampAtBottom();
});

area.addEventListener("input", () => {
  ensureBottomBuffer();
  setIndicator("...");

  clearTimeout(localTimer);
  localTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, area.value);
    setIndicator("保存済み ✓");
    setTimeout(() => setIndicator(""), 1500);
  }, LOCAL_MS);

  if (gistToken) {
    clearTimeout(gistTimer);
    gistTimer = setTimeout(() => pushToGist(area.value), GIST_MS);
  }
});

window.addEventListener("beforeunload", () => {
  localStorage.setItem(STORAGE_KEY, area.value);
});

// =============================================
//  カーソル下の余白確保（PC）
// =============================================
function ensureBottomBuffer() {
  if (window.innerWidth < 1024) return;
  requestAnimationFrame(() => {
    const style  = window.getComputedStyle(area);
    const lineH  = parseFloat(style.lineHeight);
    if (!lineH || isNaN(lineH)) return;
    const bufferPx   = lineH * 3;
    const paddingTop = parseFloat(style.paddingTop) || 20;
    const lines   = area.value.substr(0, area.selectionEnd).split("\n");
    const cursorY = paddingTop + (lines.length - 1) * lineH;
    const headerH  = document.querySelector("header").offsetHeight || 0;
    const visibleH = window.visualViewport ? window.visualViewport.height - headerH : area.clientHeight;
    const visibleBottom = area.scrollTop + visibleH;
    if (cursorY + bufferPx + lineH > visibleBottom) {
      area.scrollTop = cursorY + bufferPx + lineH - visibleH;
    }
  });
}

// =============================================
//  タブ切替
// =============================================
function showTab(name) {
  document.getElementById("tab-memo").style.display   = name === "memo"   ? "flex" : "none";
  document.getElementById("tab-search").style.display = name === "search" ? "flex" : "none";
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["memo","search"][i] === name);
  });
  if (name === "memo")   openMemoTab();
  if (name === "search") document.getElementById("search-input").focus();
}

// =============================================
//  検索
// =============================================
function doSearch(query) {
  const results = document.getElementById("search-results");
  if (!query.trim()) {
    results.innerHTML = '<div id="search-hint">キーワードを入力すると<br>タイムスタンプ区切りごとに<br>検索結果が表示されます</div>';
    return;
  }
  const text  = area.value;
  const q     = query.toLowerCase();
  const qEsc  = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re    = new RegExp(`(${qEsc})`, "gi");

  const blocks = [];
  let curTs = "", curLines = [];
  for (const line of text.split("\n")) {
    if (/^── .+ ──$/.test(line)) {
      if (curLines.join("\n").trim()) blocks.push({ts: curTs, body: curLines.join("\n")});
      curTs = line; curLines = [];
    } else {
      curLines.push(line);
    }
  }
  if (curLines.join("\n").trim()) blocks.push({ts: curTs, body: curLines.join("\n")});

  const matched = blocks.filter(b => b.body.toLowerCase().includes(q));
  if (!matched.length) { results.innerHTML = '<div id="search-empty">見つかりませんでした</div>'; return; }

  results.innerHTML = matched.map(b => {
    const highlighted = escHtml(b.body).replace(re, "<mark>$1</mark>");
    return `<div class="result-block" onclick="jumpTo(${JSON.stringify(b.ts)})">
      ${b.ts ? `<div class="result-meta">${escHtml(b.ts)}</div>` : ""}
      ${highlighted}
    </div>`;
  }).join("");
}

function jumpTo(ts) {
  showTab("memo");
  if (!ts) { area.scrollTop = 0; return; }
  const idx = area.value.indexOf(ts);
  if (idx === -1) return;
  area.focus();
  area.setSelectionRange(idx, idx + ts.length);
  const lines = area.value.slice(0, idx).split("\n").length;
  area.scrollTop = lines * (18 * 1.9) - area.clientHeight / 2;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
